name: natural_remedies_app
description: Offline-first mobile learning app for natural remedies (Flutter + TFLite)
publish_to: "none"
version: 0.3.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

# --- Versions are pinned with ^ (caret) to track compatible updates ---
dependencies:
  flutter:
    sdk: flutter

  # iOS-like visuals, navigation, state, i18n
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  google_fonts: ^6.2.1    # Inter on Android; SF on iOS stays system

  # Offline data, paths
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # On-device ML
  tflite_flutter: ^0.11.0
  

  # UI niceties
  flutter_svg: ^2.0.10
  transparent_image: ^2.0.1
  animations: ^2.0.11
  share_plus: ^12.0.0
  path: ^1.9.1
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  dart_sentencepiece_tokenizer: ^1.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations: 
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11   # needed later if you generate code (e.g., Hive adapters)
  flutter_staggered_grid_view: ^0.7.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#E8F5E9"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/corpus/en/
    - assets/corpus/sw/
    - assets/images/articles_jpg/
    - assets/images/fallbacks/
    - assets/models_e5small/encoder_e5small_dynamic_quant.tflite
    - assets/models_e5small/tokenizer.json
    - assets/models_e5small/tokenizer_config.json
    - assets/embeddings_e5small/index_en_tflite.bin
    - assets/embeddings_e5small/meta_en_tflite.json
    - assets/embeddings_e5small/index_sw_tflite.bin
    - assets/embeddings_e5small/meta_sw_tflite.json
    - assets/models/vocab.txt
    - assets/images/articles_jpg/imagetwo.jpg
    - assets/images/articles_jpg/imageone.jpg
    - assets/icon/app_icon.png